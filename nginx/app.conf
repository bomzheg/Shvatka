server {
    listen 80;

    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $u_shvatka_backend shvatka-backend;
        proxy_pass http://$u_shvatka_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /cdn/ {
        resolver 127.0.0.11 valid=30s;
        set $u_shvatka_backend shvatka-backend;
        proxy_pass http://$u_shvatka_backend:8000/api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /protected-files/ {
        internal;
        alias /data/files/;
    }
}